name: Build & Sign IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      # ---------------------------------------------------------
      # 0. CHECKOUT
      # ---------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------
      # 1. INSTALL NODE (FOR AI AGENT)
      # ---------------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # ---------------------------------------------------------
      # 2. INSTALL DEPENDENCIES FOR AI AGENT
      # ---------------------------------------------------------
      - name: Remove corrupted lockfile
        run: rm -f package-lock.json
        
      - name: Install AI agent dependencies
        run: |
          npm install

      # ---------------------------------------------------------
      # 3. RUN AI MULTI‑PROJECT AGENT
      # ---------------------------------------------------------
      - name: Run AI Multi‑Project Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node agent/agent.js

      # ---------------------------------------------------------
      # 4. SELECT XCODE
      # ---------------------------------------------------------
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # ---------------------------------------------------------
      # 5. INSTALL PYTHON DEPENDENCIES (SAFE)
      # ---------------------------------------------------------
      - name: Install dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install cryptography pyopenssl biplist

      # ---------------------------------------------------------
      # 6. BUILD iOS APP
      # ---------------------------------------------------------
      - name: Build iOS app
        run: |
          xcodebuild \
            -project Fearn.xcodeproj \
            -scheme Fearn \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/Fearn.xcarchive \
            archive

      # ---------------------------------------------------------
      # 7. EXPORT IPA
      # ---------------------------------------------------------
      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/Fearn.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      # ---------------------------------------------------------
      # 8. SIGN IPA
      # ---------------------------------------------------------
      - name: Sign IPA
        run: |
          source venv/bin/activate
          python3 fearn_signer.py resign \
            -i build/Fearn.ipa \
            -c "Fearn Self-Signed" \
            -o Fearn-signed.ipa \
            -p certs/Fearn.mobileprovision \
            --verbose

      # ---------------------------------------------------------
      # 9. VERIFY IPA CONTENTS
      # ---------------------------------------------------------
      - name: Verify IPA contents
        run: unzip -l Fearn-signed.ipa | head -20

      # ---------------------------------------------------------
      # 10. RELEASE IPA
      # ---------------------------------------------------------
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: Fearn-signed.ipa
          tag_name: v1.7.0-${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
