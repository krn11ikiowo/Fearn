name: NexStore Sync + Multi-Push Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------
      # 1. CLONE NexStore 2
      # ---------------------------------------------------------
      - name: Clone NexStore 2
        run: |
          rm -rf nexstore
          git clone https://github.com/NovaDev404/NexStore-new.git nexstore

      # ---------------------------------------------------------
      # 2. FORCE COPY NexStore SOURCE → Fearn
      # ---------------------------------------------------------
      - name: Copy NexStore source into Fearn
        run: |
          mkdir -p Fearn
          rm -rf Fearn/*
          cp -R nexstore/src/* Fearn/

      # ---------------------------------------------------------
      # 3. FORCE COPY NexStore TWEAKS → NexStoreTweaks
      # ---------------------------------------------------------
      - name: Copy NexStore tweaks
        run: |
          mkdir -p NexStoreTweaks
          rm -rf NexStoreTweaks/*
          cp -R nexstore/tweaks/* NexStoreTweaks/

      # ---------------------------------------------------------
      # 4. FIRST PUSH — NexStore sync
      # ---------------------------------------------------------
      - name: Commit NexStore sync
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Fearn NexStoreTweaks
          git commit -m "Sync NexStore source + tweaks (forced overwrite)" || echo "No changes"
          git push || echo "Nothing to push"

      # ---------------------------------------------------------
      # 5. SELECT XCODE
      # ---------------------------------------------------------
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # ---------------------------------------------------------
      # 6. BUILD IPA
      # ---------------------------------------------------------
      - name: Build iOS app
        run: |
          xcodebuild \
            -project Fearn.xcodeproj \
            -scheme Fearn \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/Fearn.xcarchive \
            archive

      # ---------------------------------------------------------
      # 7. EXPORT IPA
      # ---------------------------------------------------------
      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/Fearn.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      # ---------------------------------------------------------
      # 8. VERSION BUMP — SECOND PUSH
      # ---------------------------------------------------------
      - name: Version bump
        run: |
          if [ ! -f VERSION ]; then echo "1.0.0" > VERSION; fi

          old=$(cat VERSION)
          major=$(echo $old | cut -d. -f1)
          minor=$(echo $old | cut -d. -f2)
          patch=$(echo $old | cut -d. -f3)
          new_patch=$((patch + 1))
          new="$major.$minor.$new_patch"

          echo $new > VERSION

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $new" Fearn/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $new" Fearn/Info.plist

          git add VERSION Fearn/Info.plist
          git commit -m "Version bump to $new" || echo "No changes"
          git push || echo "Nothing to push"

      # ---------------------------------------------------------
      # 9. SIGN IPA — THIRD PUSH
      # ---------------------------------------------------------
      - name: Sign IPA
        run: |
          python3 fearn_signer.py resign \
            -i build/Fearn.ipa \
            -c "Fearn Self-Signed" \
            -o Fearn-signed.ipa \
            -p certs/Fearn.mobileprovision \
            --verbose

          git add Fearn-signed.ipa
          git commit -m "Add signed IPA" || echo "No changes"
          git push || echo "Nothing to push"

      # ---------------------------------------------------------
      # 10. RELEASE IPA
      # ---------------------------------------------------------
      - name: Release IPA
        uses: softprops/action-gh-release@v1
        with:
          files: Fearn-signed.ipa
          tag_name: v${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
