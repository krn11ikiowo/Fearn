name: Build & Sign IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          brew install openssl zip
          python -m pip install --upgrade pip
      
      - name: Generate certificates and provisioning profile
        run: |
          python3 fearn_cert_provisioning_generator.py \
            --bundle-id "com.krnlthemodder.fearn" \
            --team-id "XXXXXXXXXX" \
            --name "Fearn" \
            --verbose
      
      - name: Ensure executable exists
        run: |
          mkdir -p Payload/Fearn.app
          if [ ! -f "Payload/Fearn.app/Fearn" ]; then
            touch "Payload/Fearn.app/Fearn"
            chmod +x "Payload/Fearn.app/Fearn"
          fi
      
      - name: Build IPA
        run: |
          python3 fearn_ipa_builder.py \
            --name "Fearn" \
            --bundle-id "com.krnlthemodder.fearn" \
            --version "1.7.0" \
            --output "." \
            --verbose
      
      - name: Sign IPA
        run: |
          python3 fearn_signer.py resign \
            -i Fearn-1.7.0.ipa \
            -c "Fearn Self-Signed" \
            -o Fearn-1.7.0-signed.ipa \
            -p certs/Fearn.mobileprovision \
            --verbose
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Fearn-1.7.0-signed.ipa
            certs/Fearn.p12
            certs/Fearn.mobileprovision
          tag_name: v1.7.0-${{ github.run_number }}
          body: |
            # Fearn v1.7.0 Build ${{ github.run_number }}
            
            ## 🐛 Major Bugfix Release
            
            This release includes critical crash fixes and stability improvements for the IPA signing process.
            
            ## Files
            - `Fearn-1.7.0-signed.ipa` - Signed IPA ready for sideloading
            - `Fearn.p12` - Certificate (Password: fearn123)
            - `Fearn.mobileprovision` - Provisioning profile
            
            ## Installation
            
            1. Import `Fearn.p12` into Keychain Access (password: fearn123)
            2. Trust the certificate
            3. Install IPA using Xcode or ideviceinstaller
            
            ## Features
            - ✅ Improved IPA signing stability
            - ✅ Fixed crash handling in provisioning profile
            - ✅ Self-signed certificate with proper entitlements
            - ✅ Provisioning profile with get-task-allow
            - ✅ Ready for sideloading
            - ✅ Debugging enabled
            
            Built on: ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
