name: Sync NexStore 2 → Fearn + Build + Sign IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------
      # 1. CLONE NexStore 2 SOURCE
      # ---------------------------------------------------------
      - name: Clone NexStore 2
        run: |
          echo "Cloning NexStore-new..."
          rm -rf nexstore
          git clone https://github.com/NovaDev404/NexStore-new.git nexstore

      # ---------------------------------------------------------
      # 2. COPY NexStore SOURCE → Fearn
      # ---------------------------------------------------------
      - name: Copy NexStore source into Fearn
        run: |
          echo "Copying NexStore src → Fearn..."
          mkdir -p Fearn
          if [ -d "nexstore/src" ]; then
            cp -R nexstore/src/* Fearn/
          fi

      # ---------------------------------------------------------
      # 3. COPY NexStore TWEAKS → NexStoreTweaks
      # ---------------------------------------------------------
      - name: Copy NexStore tweaks
        run: |
          echo "Copying NexStore tweaks → NexStoreTweaks..."
          mkdir -p NexStoreTweaks
          if [ -d "nexstore/tweaks" ]; then
            cp -R nexstore/tweaks/* NexStoreTweaks/
          fi

      # ---------------------------------------------------------
      # 4. COMMIT + PUSH CHANGES
      # ---------------------------------------------------------
      - name: Commit synced NexStore source + tweaks
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Fearn NexStoreTweaks
          git commit -m "Sync NexStore 2 source + tweaks" || echo "No changes to commit"
          git push || echo "Nothing to push"

      # ---------------------------------------------------------
      # 5. SELECT XCODE
      # ---------------------------------------------------------
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # ---------------------------------------------------------
      # 6. BUILD IPA
      # ---------------------------------------------------------
      - name: Build iOS app
        run: |
          xcodebuild \
            -project Fearn.xcodeproj \
            -scheme Fearn \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/Fearn.xcarchive \
            archive

      # ---------------------------------------------------------
      # 7. EXPORT IPA
      # ---------------------------------------------------------
      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/Fearn.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      # ---------------------------------------------------------
      # 8. SIGN IPA
      # ---------------------------------------------------------
      - name: Sign IPA
        run: |
          python3 fearn_signer.py resign \
            -i build/Fearn.ipa \
            -c "Fearn Self-Signed" \
            -o Fearn-signed.ipa \
            -p certs/Fearn.mobileprovision \
            --verbose

      # ---------------------------------------------------------
      # 9. RELEASE IPA
      # ---------------------------------------------------------
      - name: Release IPA
        uses: softprops/action-gh-release@v1
        with:
          files: Fearn-signed.ipa
          tag_name: v${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
