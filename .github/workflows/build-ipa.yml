name: NexStore Sync + Self-Healing (No XML Build)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone NexStore 2
        run: |
          rm -rf nexstore
          git clone https://github.com/NovaDev404/NexStore-new.git nexstore

      - name: Ensure folders exist
        run: |
          mkdir -p Fearn
          mkdir -p NexStoreTweaks
          mkdir -p Fearn/Frameworks

      - name: Copy NexStore source
        run: |
          if [ -d "nexstore/NexStore" ]; then
            cp -R nexstore/NexStore/*.swift Fearn/
          fi

      - name: Copy NexStore tweaks
        run: |
          if [ -d "nexstore/Tweaks" ]; then
            cp -R nexstore/Tweaks/*.swift NexStoreTweaks/
          fi

      - name: Copy NexStore frameworks
        run: |
          if [ -d "nexstore/Frameworks" ]; then
            cp -R nexstore/Frameworks/* Fearn/Frameworks/
          fi

      - name: Commit sync
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Fearn NexStoreTweaks
          git commit -m "Sync NexStore (XML removed)" || echo "No changes"
          git push || echo "Nothing to push"
