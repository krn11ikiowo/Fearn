name: Initialize Xcode Structure (Self-Healing)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create required folders + placeholder files
        run: |
          # Create folders
          mkdir -p Fearn
          mkdir -p Fearn.xcodeproj
          mkdir -p Fearn.xcodeproj/project.xcworkspace
          mkdir -p Fearn.xcodeproj/xcshareddata/xcschemes
          mkdir -p NexStoreTweaks
          mkdir -p Fearn/Frameworks
          mkdir -p XcodeTemplate
          mkdir -p SwiftTemplate

          # Create placeholder files ONLY if missing
          [ ! -f XcodeTemplate/project.pbxproj ] && echo "// placeholder pbxproj" > XcodeTemplate/project.pbxproj
          [ ! -f XcodeTemplate/Info.plist ] && echo "// placeholder plist" > XcodeTemplate/Info.plist
          [ ! -f XcodeTemplate/contents.xcworkspacedata ] && echo "// placeholder workspace" > XcodeTemplate/contents.xcworkspacedata
          [ ! -f XcodeTemplate/Fearn.xcscheme ] && echo "// placeholder scheme" > XcodeTemplate/Fearn.xcscheme

          [ ! -f SwiftTemplate/AppDelegate.swift ] && echo "// placeholder swift" > SwiftTemplate/AppDelegate.swift
          [ ! -f SwiftTemplate/SceneDelegate.swift ] && echo "// placeholder swift" > SwiftTemplate/SceneDelegate.swift
          [ ! -f SwiftTemplate/ViewController.swift ] && echo "// placeholder swift" > SwiftTemplate/ViewController.swift

      - name: Commit structure (self-healing)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Fearn Fearn.xcodeproj NexStoreTweaks XcodeTemplate SwiftTemplate

          # Try commit
          git commit -m "Initialize Xcode folder structure" && echo "Commit succeeded" || {
            echo "No changes — forcing commit"
            echo "force-$(date +%s)" > .force_init
            git add .force_init
            git commit -m "Forced commit: no changes originally"
          }

          # Retry push up to 3 times
          for i in 1 2 3; do
            git push && break
            echo "Push failed, retrying ($i/3)..."
            sleep 2
          done
