name: Initialize Fearn Folder Structure (Self-Healing)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init-folders:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create required folders
        run: |
          mkdir -p Fearn
          mkdir -p Fearn.xcodeproj
          mkdir -p Fearn.xcodeproj/project.xcworkspace
          mkdir -p Fearn.xcodeproj/xcshareddata/xcschemes
          mkdir -p NexStoreTweaks
          mkdir -p Fearn/Frameworks
          mkdir -p XcodeTemplate
          mkdir -p SwiftTemplate

      - name: Commit folder structure (self-healing)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Fearn Fearn.xcodeproj NexStoreTweaks XcodeTemplate SwiftTemplate

          # Try commit
          git commit -m "Initialize folder structure" && echo "Commit succeeded" || {
            echo "No changes detected — creating dummy file to force commit"
            echo "init-$(date +%s)" > .init_force
            git add .init_force
            git commit -m "Force commit: no changes originally"
          }

          # Retry push up to 3 times
          for i in 1 2 3; do
            git push && break
            echo "Push failed, retrying ($i/3)..."
            sleep 2
          done
