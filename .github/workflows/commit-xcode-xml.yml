name: Commit Xcode XML Files
on: workflow_dispatch
permissions:
  contents: write

jobs:
  commit-xml:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy XML files
        run: |
          mkdir -p Fearn
          mkdir -p Fearn.xcodeproj/project.xcworkspace
          mkdir -p Fearn.xcodeproj/xcshareddata/xcschemes

          cp XcodeTemplate/Info.plist Fearn/
          cp XcodeTemplate/contents.xcworkspacedata Fearn.xcodeproj/project.xcworkspace/
          cp XcodeTemplate/Fearn.xcscheme Fearn.xcodeproj/xcshareddata/xcschemes/

      - name: Commit XML
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Fearn Fearn.xcodeproj
          git commit -m "Add Xcode XML files" || echo "No changes"
          git push || echo "Nothing to push"
