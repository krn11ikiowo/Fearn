name: Add 4 Workflows (4 Commits)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-workflows:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------
      # Commit 1 — init-folders.yml
      # ---------------------------------------------------------
      - name: Create init-folders workflow
        run: |
          cat << 'EOF' > .github/workflows/init-folders.yml
name: Initialize Fearn Folder Structure
on: workflow_dispatch
permissions:
  contents: write
jobs:
  init:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create folders
        run: |
          mkdir -p Fearn Fearn.xcodeproj NexStoreTweaks Fearn/Frameworks XcodeTemplate SwiftTemplate
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Fearn Fearn.xcodeproj NexStoreTweaks XcodeTemplate SwiftTemplate
          git commit -m "Init folder structure" || echo "No changes"
          git push || echo "Nothing to push"
EOF

      - name: Commit workflow 1 (self-healing)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .github/workflows/init-folders.yml
          git commit -m "Add init-folders workflow" || {
            echo "No changes — forcing commit"
            echo "force-$(date +%s)" > .force_init_1
            git add .force_init_1
            git commit -m "Forced commit: init-folders workflow"
          }

          for i in 1 2 3; do
            git push && break
            echo "Push failed, retrying ($i/3)..."
            sleep 2
          done

      # ---------------------------------------------------------
      # Commit 2 — commit-swift.yml
      # ---------------------------------------------------------
      - name: Create commit-swift workflow
        run: |
          cat << 'EOF' > .github/workflows/commit-swift.yml
name: Commit Swift Files
on: workflow_dispatch
permissions:
  contents: write
jobs:
  commit-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy Swift files
        run: |
          mkdir -p Fearn
          cp -R SwiftTemplate/*.swift Fearn/ 2>/dev/null || echo "No Swift files found"
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Fearn
          git commit -m "Add Swift files" || echo "No changes"
          git push || echo "Nothing to push"
EOF

      - name: Commit workflow 2 (self-healing)
        run: |
          git add .github/workflows/commit-swift.yml
          git commit -m "Add commit-swift workflow" || {
            echo "No changes — forcing commit"
            echo "force-$(date +%s)" > .force_init_2
            git add .force_init_2
            git commit -m "Forced commit: commit-swift workflow"
          }

          for i in 1 2 3; do
            git push && break
            echo "Push failed, retrying ($i/3)..."
            sleep 2
          done

      # ---------------------------------------------------------
      # Commit 3 — commit-xcode.yml
      # ---------------------------------------------------------
      - name: Create commit-xcode workflow
        run: |
          cat << 'EOF' > .github/workflows/commit-xcode.yml
name: Commit Xcode Files
on: workflow_dispatch
permissions:
  contents: write
jobs:
  commit-xcode:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy Xcode files
        run: |
          mkdir -p Fearn.xcodeproj/project.xcworkspace
          mkdir -p Fearn.xcodeproj/xcshareddata/xcschemes
          cp XcodeTemplate/* Fearn.xcodeproj/ 2>/dev/null || echo "No Xcode files found"
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Fearn.xcodeproj
          git commit -m "Add Xcode project files" || echo "No changes"
          git push || echo "Nothing to push"
EOF

      - name: Commit workflow 3 (self-healing)
        run: |
          git add .github/workflows/commit-xcode.yml
          git commit -m "Add commit-xcode workflow" || {
            echo "No changes — forcing commit"
            echo "force-$(date +%s)" > .force_init_3
            git add .force_init_3
            git commit -m "Forced commit: commit-xcode workflow"
          }

          for i in 1 2 3; do
            git push && break
            echo "Push failed, retrying ($i/3)..."
            sleep 2
          done

      # ---------------------------------------------------------
      # Commit 4 — build-ipa.yml
      # ---------------------------------------------------------
      - name: Create build-ipa workflow
        run: |
          cat << 'EOF' > .github/workflows/build-ipa.yml
name: Build IPA
on:
  workflow_dispatch
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Build
        run: |
          xcodebuild \
            -project Fearn.xcodeproj \
            -scheme Fearn \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/Fearn.xcarchive \
            archive
      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/Fearn.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist
EOF

      - name: Commit workflow 4 (self-healing)
        run: |
          git add .github/workflows/build-ipa.yml
          git commit -m "Add build-ipa workflow" || {
            echo "No changes — forcing commit"
            echo "force-$(date +%s)" > .force_init_4
            git add .force_init_4
            git commit -m "Forced commit: build-ipa workflow"
          }

          for i in 1 2 3; do
            git push && break
            echo "Push failed, retrying ($i/3)..."
            sleep 2
          done
