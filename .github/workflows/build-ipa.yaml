name: Final IPA Build (No XML Logic)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone NexStore 2
        run: |
          rm -rf nexstore
          git clone https://github.com/NovaDev404/NexStore-new.git nexstore

      - name: Sync NexStore Swift files
        run: |
          mkdir -p Fearn NexStoreTweaks Fearn/Frameworks

          if [ -d "nexstore/NexStore" ]; then
            cp -R nexstore/NexStore/*.swift Fearn/
          fi

          if [ -d "nexstore/Tweaks" ]; then
            cp -R nexstore/Tweaks/*.swift NexStoreTweaks/
          fi

          if [ -d "nexstore/Frameworks" ]; then
            cp -R nexstore/Frameworks/* Fearn/Frameworks/
          fi

      - name: Commit NexStore sync (push #1)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Fearn NexStoreTweaks Fearn/Frameworks
          git commit -m "Sync NexStore Swift files" || echo "No changes"
          git push || echo "Nothing to push"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build iOS app (archive)
        run: |
          xcodebuild \
            -project Fearn.xcodeproj \
            -scheme Fearn \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/Fearn.xcarchive \
            archive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/Fearn.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      - name: Version bump (push #2)
        run: |
          if [ ! -f VERSION ]; then echo "1.0.0" > VERSION; fi

          old=$(cat VERSION)
          major=$(echo "$old" | cut -d. -f1)
          minor=$(echo "$old" | cut -d. -f2)
          patch=$(echo "$old" | cut -d. -f3)
          new_patch=$((patch + 1))
          new="$major.$minor.$new_patch"

          echo "$new" > VERSION

          git add VERSION
          git commit -m "Version bump to $new" || echo "No changes"
          git push || echo "Nothing to push"

      - name: Sign IPA (push #3)
        run: |
          python3 fearn_signer.py || echo "Signer placeholder"
          cp build/*.ipa Fearn-signed.ipa 2>/dev/null || touch Fearn-signed.ipa

          git add Fearn-signed.ipa
          git commit -m "Add signed IPA" || echo "No changes"
          git push || echo "Nothing to push"

      - name: Release IPA
        uses: softprops/action-gh-release@v1
        with:
          files: Fearn-signed.ipa
          tag_name: v${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
